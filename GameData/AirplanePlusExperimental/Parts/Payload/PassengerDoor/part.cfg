@PART[passengeroor]:FOR[AirplanePlus]
{
	&node_stack_top2 = 0.0, 0.44875, 0.0, 0.0, -1.0, 0.0, 0
	&node_stack_bottom2 = 0.0, -0.44875, 0.0, 0.0, 1.0, 0.0, 0

	@MODULE[ModuleCargoBay]
	{
		lookupRadius = 0.8
		lookupCenter = 0.0, 0.0, 0.0

		%nodeOuterForeID = top
		%nodeOuterAftID = bottom
		%nodeInnerForeID = top2
		%nodeInnerAftID = bottom2
	}
}

+PART[passengeroor]:FOR[AirplanePlus]
{
	@name = passengerdoor
}

@PART[passengeroor]:FOR[AirplanePlus]
{
	category = -1
	subcategory = -1
}

@CUSTOM_PARTLIST_CATEGORY:HAS[#categoryName[Airplane+]]
{
	@SUBCATEGORY[Payload]
	{
		@PARTS
		{
			part = passengerdoor
		}
	}
}

