Localization
{
	en-us
	{
		#loc_APP_modname = AirplanePlus

		#loc_APP_agent_title = Kerbal Standard
		#loc_APP_agent_description = Kerbal Standard is a continually growing Conglomerate. It has many products named after the initials of certain subsidiary companies such as RR, DB, and WMB. Products under the construction of the Parent Company of Kerbal Standard have no special names. Kerbal Standard has known dealings with Winter Owl and C7 Aerospace and bought some of the part design rights to be able to work with them. Most of the designs of the conglomerate are made with great design in mind and to sell off to great commercial benefits.

		#loc_APP_part_manufacturer = Kerbal Standard
		#loc_APP_part_description = A Part from AirplanePlus.

		// Part : 109Prop
		#loc_APP_part_109Prop_title = KB 601 "Tornado" Engine
		#loc_APP_part_109Prop_description = It's a V12 engine with a big fan in it, only, there's a catch. This is a liquid-cooled and inverted V12 engine. Notice that the exhaust are on the bottom part now. That tends to happen during break time in the lab, great breakthroughs such as flipping an engine upside down.

		// Part : 144cockpit
		#loc_APP_part_144cockpit_title = Mk2/Object 1.44 Non-Commercial Cockpit
		#loc_APP_part_144cockpit_description = Fits not two but only one Kerbal! Wait, what? I don't know if that's a good thing. But it should be lighter, right?

		// Part : 152Prop
		#loc_APP_part_152Prop_title = L K-235 "Cat" Turboprop Engine
		#loc_APP_part_152Prop_description = The K-235 Rotamax is the poor Kerbal's turboprop. Whoever says that there is only one engine in the 0.625 bulkhead turboclass, clearly does not acknowledge the utility of this cheap, reliable engine.

		// Part : 51prop
		#loc_APP_part_51prop_title = WMB VI "Vortex" Engine
		#loc_APP_part_51prop_description = Not exactly the origin of the KB 601 "Tornado" Engine but this early design seem to have striking similarities to the Tornado. The WMB VI Engine boasts its Vee engine so much that the cowl is literally shaped like the engine itself.

		// Part : 609prop
		#loc_APP_part_609prop_title = KT6C "Kitty" Turboshaft Engine
		#loc_APP_part_609prop_description = A later version of the KT6A modified to be capable of vertical and horizontal flight. Equipped with special servos to switch from one position to another and in between.

		// Part : JuniorFuselage
		#loc_APP_part_JuniorFuselage_title = Mk1 Junior Liquid Fuel Fuselage
		#loc_APP_part_JuniorFuselage_description = No money? No problem!

		// Part : KP12
		#loc_APP_part_KP12_title = KP-12 "Bear" Kontraprop Engine
		#loc_APP_part_KP12_description = It has two sets for propellers? You could never go wrong with more propellers!

		// Part : Mk1JuniorStructural
		#loc_APP_part_Mk1JuniorStructural_title = Structural Fuselage Junior
		#loc_APP_part_Mk1JuniorStructural_description = A standard fuselage. Junior sized. Carries no fuel; is there merely as a structural element. As such, it's lighter and more solid due to reinforcements.

		// Part : Mk1SlantStructural
		#loc_APP_part_Mk1SlantStructural_title = Structural Fuselage Offset
		#loc_APP_part_Mk1SlantStructural_description = An offset of your regular Fuselage. Useful for modifying the linear nature of crafts and designing weird shapes.

		// Part : S1APU
		#loc_APP_part_S1APU_title = Size 1 100-KE Auxiliary Power Engine
		#loc_APP_part_S1APU_description = Defective engines which could not produce enough thrust are now being recycled mostly for environmental concerns and not for product costs in Kerbal Standard. On the bright side, it still produces electricity, and the lower thrust means it will consume less fuel.

		// Part : S1p5APU
		#loc_APP_part_S1p5APU_title = Size 1.5 220-KE Auxiliary Power Engine
		#loc_APP_part_S1p5APU_description = The 220-KE APE is the bigger brother of the 100-KE. On production lines of Kerbal Standard, intern Kerbals are often deployed due to help the youth learn and not due to lack of workforce. There are often mistakes on creation in terms of scale, these are then repurposed and modified to work on the closest bulkhead which is Size 1.5. It works so far. No refunds.

		// Part : S2APU
		#loc_APP_part_S2APU_title = Size 2 131-9K Auxiliary Power Engine
		#loc_APP_part_S2APU_description = The 131-9K is vastly different compared to the other designed APEs. It is an experimental purpose-built APE which is not a repurposed failed engine. This APE is designated to be an Auxiliary Power Generator, and made to be one. Technically. The parts used are still from the smaller failures which could be reused on bigger parts. Thus, resulting in the 131 project. The 131-9K is one of the most efficient APEs ever built, mostly because it is designed to be one.

		// Part : S2Hull
		#loc_APP_part_S2Hull_title = Structural Hull S2
		#loc_APP_part_S2Hull_description = A standard Size 2 Hull. Used for carrying cargo and carries no fuel; is there merely as a structural element. As such, it's lighter and more solid due to reinforcements.

		// Part : S2Structural
		#loc_APP_part_S2Structural_title = Structural Fuselage S2
		#loc_APP_part_S2Structural_description = A standard Size 2 fuselage. Carries no fuel; is there merely as a structural element. As such, it's lighter and more solid due to reinforcements.

		// Part : airbuscockpit
		#loc_APP_part_airbuscockpit_title = Size 2 Commercial Cockpit
		#loc_APP_part_airbuscockpit_description = It carries 2 kerbals and looks very bulky. Its control is great but the roll. It was always a wonder why Mk2 sizes was not a cylinder shape with 2.5m diameter but Kerbal Standard has made a Size 2 cockpit to accomodate the missing piece. Not just that but we're also on sale. It is a cheaper alternative to Mk2.

		// Part : airbusreargear
		#loc_APP_part_airbusreargear_title = KS-320 Asymmetric Landing Gear
		#loc_APP_part_airbusreargear_description = There are a lot of landing gear choices you can have in the program but it's quite illogical that there is a lacking of assymetric landing gears which mirror the suspension left and right on its respective sides. Sure, the effect could be the fact that it would be difficult to manufacture the parts exactly like the other side but those are just minor details, no need to get into.

		// Part : airramp
		#loc_APP_part_airramp_title = Size 2 Passenger Door
		#loc_APP_part_airramp_description = Designed to make a way for kerbals trying to get out of the Size 2 hollow fuselages.

		// Part : b29cockpit
		#loc_APP_part_b29cockpit_title = Size 2 Viewer's Cockpit II
		#loc_APP_part_b29cockpit_description = Offers more room than you can imagine on the cockpit, more kerbals to fit in. Up to for crew members in the cockpit and the view is better than any. Features an almost full glass cockpit you'd think that it could just all have been glass but there is enough part stress as it is for the structural integrity it might just disassemble itself. Though the last part is not that important when in flight.

		// Part : b29gear
		#loc_APP_part_b29gear_title = KS-FAT-29 Huge Landing Gear
		#loc_APP_part_b29gear_description = In compensation of small kerbals is non other than the KS-FAT-29 Huge Landing Gear. Just the wheel itself is as large as a kerbal, huge struts for safety purposes. No matter how much the volume increases, the material would probably hold together. Bigger is always better.

		// Part : bellcockpit
		#loc_APP_part_bellcockpit_title = MK1 Viewer's Cockpit
		#loc_APP_part_bellcockpit_description = You know what is wrong with Kerbals these days? Everyone is obsessed with speed. Take a minute to admire that view with this glassy and classy cockpit.

		// Part : bellprop
		#loc_APP_part_bellprop_title = RR K250 "Maverick" Turboshaft Engine
		#loc_APP_part_bellprop_description = Your first choice when you would like to stop and go absolutely anywhere in kerbin.

		// Part : belltail
		#loc_APP_part_belltail_title = RR K250-S Control Rotor
		#loc_APP_part_belltail_description = A smaller rotor with its shaft usually connected to an existing engine. Either you use it to avoid uncontrollable spinning or use it to make your aircraft spin uncontrollably.

		// Part : bigwing
		#loc_APP_part_bigwing_title = FAT-T3R Aeroplane Main Wing
		#loc_APP_part_bigwing_description = One of the largest lifting surfaces in production. The internal volume of these is big enough to carry generously sized fuel tanks.

		// Part : biplanegear
		#loc_APP_part_biplanegear_title = KS-H1 Fixed Landing Gear
		#loc_APP_part_biplanegear_description = Due to the limited usability of having only one stick to hold the wheel (LY-01), an ingenious breakthrough has been achieved by adding another stick, forming a V converging to the wheel center.

		// Part : blackhawkgear
		#loc_APP_part_blackhawkgear_title = KS-V1 Fixed Landing Gear
		#loc_APP_part_blackhawkgear_description = The KS-V1 is a more sophisticated basic gear, rather than a wheel on a stick. It's slightly heavier for the same function, but sometimes, negligible weight increase is better than an ugly alternative.

		// Part : blackhawkprop
		#loc_APP_part_blackhawkprop_title = K700 "Hawk" Turboshaft Engine
		#loc_APP_part_blackhawkprop_description = If you're looking for something not too powerful but also not very weak to use for transportation, then the K700 "Hawk" is perfect for you. It has four blades, not much and not too few, and it's reliable.

		// Part : bombardiercockpit
		#loc_APP_part_bombardiercockpit_title = Size 1.5 Cockpit
		#loc_APP_part_bombardiercockpit_description = When Mk1 cockpits are too cramped and Size 2 Cockpits are too spacious, there is a dichotomous choice but there will be compromises. Why not think outside of the box? When there's a demand, there will be a supply. As such, the best way to pilot a lumbering Size 1.5 craft is with its respective cockpit.

		// Part : cessnacabin
		#loc_APP_part_cessnacabin_title = MK3S1 Crew Cabin
		#loc_APP_part_cessnacabin_description = A less cozy passenger cabin capable of up to two seats, side by side, with small space in between to squeez through to move to another cabin. Although not made with the lightest materials due to the wide windows, it is assured that it's probably safe despite that and it's still light enough too. And cheap.

		// Part : cessnacockpit
		#loc_APP_part_cessnacockpit_title = MK3S1 Cockpit
		#loc_APP_part_cessnacockpit_description = One of the earliest two seaters available in the catalog, the MK3S1 cockpit is a simple, light and small design made to work so that safe enclosed flight is possible.

		// Part : cf34
		#loc_APP_part_cf34_title = J-34 "Chevron" High-Bypass Turbofan Engine
		#loc_APP_part_cf34_description = The J-34 "Chevron" is a smaller cousin of the J-56 "Lotus" with fewer blades but with just as much efficiency. The size is not much different but it is restricted to radial attacment only.

		// Part : cfm56
		#loc_APP_part_cfm56_title = J-56 "Lotus" High-Bypass Turbofan Engine
		#loc_APP_part_cfm56_description = This engine works best at low cruising speeds and altitudes. Has a total of 38 blades per engine. Check blades before purchase, warranty void if more or less than 38 blades.

		// Part : chaikaprop
		#loc_APP_part_chaikaprop_title = K-25V "Cyclone" Radial Engine
		#loc_APP_part_chaikaprop_description = Description in progress. Carry on. You won't need this in flight, are you?

		// Part : chinookprop
		#loc_APP_part_chinookprop_title = L K55 "Gemini" Turboshaft Engine
		#loc_APP_part_chinookprop_description = Newer innovative engineering have yielded the "Gemini" Turboshaft Engine. Taking three wings and putting them in a spinning platform seemed to work. Sure it has three only three blades but it has wider ones and long enough to fly.

		// Part : citationcockpit
		#loc_APP_part_citationcockpit_title = MK1 Business Cockpit
		#loc_APP_part_citationcockpit_description = Feel the luxury of being in a cramped cockpit of an MK1 sized tube. The regular Mk1 cockpit would fit one Kerbal but for some reason, this cockpit could fit two. Makes you think, is it really business or commercial?

		// Part : coaxialprop
		#loc_APP_part_coaxialprop_title = KV3-117 "Twinblade" Coaxial Turboshaft Engine
		#loc_APP_part_coaxialprop_description = In an effort to optimize power with a relatively small size, the Twinblade Coaxial Turboshaft Engine was made. Not only does it pack the power in such a small package, it is also capable of more control than your regular rotor. Making it a much more stable rotor to use.

		// Part : concordecockpit
		#loc_APP_part_concordecockpit_title = Size 2 Droopnose Cockpit
		#loc_APP_part_concordecockpit_description = This specialized cockpit carries 3 Kerbals just in case you lose some. It's quite heavy because of the special mechanism that it contains. As it has a very supersonic shaped nose, it is quite long to see the runway. So what better way to see the runway than to cut the nose off and make it droop a little?

		// Part : corsairprop
		#loc_APP_part_corsairprop_title = K-2800 "Bumblebee" Radial Engine
		#loc_APP_part_corsairprop_description = This great engine has two rows of radial engines! Talk about more power!

		// Part : doublefowlerflap
		#loc_APP_part_doublefowlerflap_title = Trailing Edge Two-slot Flap
		#loc_APP_part_doublefowlerflap_description = There is no greater flap than a two-slot flap, other than a flap that has more slots. Though two-slotted flaps are already enormous. This flap is generally put in the trailing edge or the back part of the wing. Not that it's a mandatory issue, it's just like that on the manual. Usage can range to reaction with pitch to help in take-offs or be used for landing in full deployment. Can sometimes be used for subtle changes in cruise speeds as well. This two slot flap has two surfaces which can be deployed individually. Hence, it is more versatile.

		// Part : duplexcyclone
		#loc_APP_part_duplexcyclone_title = K-3350 "Tempest" Radial Engine
		#loc_APP_part_duplexcyclone_description = For when two rows of radial engines just isn't enough, there are more ways to deal with the problem than one. These include but not limited to, adding more blades, more cylinders or more length to the blades. In which case all is applied to the Tempest. Good to get the little more power needed to an already powerful engine.

		// Part : elevon2b
		#loc_APP_part_elevon2b_title = Elevon 2B
		#loc_APP_part_elevon2b_description = Made from the finest materials at hand, these flight surfaces are guaranteed to operate while attached to the craft. However studies have shown that a lack of atmosphere *may* slightly impede function. No refunds.

		// Part : f5jet
		#loc_APP_part_f5jet_title = J-85 "Tiger" Afterburning Turbofan
		#loc_APP_part_f5jet_description = A high performance 0.625 jet engine with a fixed nozzle and an afterburner for extra thrust.

		// Part : falconcockpit
		#loc_APP_part_falconcockpit_title = Mk2 Non-Commercial Cockpit
		#loc_APP_part_falconcockpit_description = Fits not two but only one Kerbal! Wait, what? I don't know if that's a good thing. But it should be lighter, right?

		// Part : fatwing0
		#loc_APP_part_fatwing0_title = FAT-A Wing Connector
		#loc_APP_part_fatwing0_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fatwing1
		#loc_APP_part_fatwing1_title = FAT-B Wing Connector
		#loc_APP_part_fatwing1_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fatwing2
		#loc_APP_part_fatwing2_title = FAT-C Wing Connector
		#loc_APP_part_fatwing2_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fatwing3
		#loc_APP_part_fatwing3_title = FAT-D Wing Connector
		#loc_APP_part_fatwing3_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fatwing4
		#loc_APP_part_fatwing4_title = FAT-E Wing Connector
		#loc_APP_part_fatwing4_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fatwing5
		#loc_APP_part_fatwing5_title = FAT-F Wing Connector
		#loc_APP_part_fatwing5_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fatwing6
		#loc_APP_part_fatwing6_title = FAT-G Wing Connector
		#loc_APP_part_fatwing6_description = Cut ups of the surplus FAT Aeroplane Main Wings for more precision but of course, less structural integrity as well.

		// Part : fighterProp
		#loc_APP_part_fighterProp_title = K1710 "Whirlwind" Engine
		#loc_APP_part_fighterProp_description = It's a V12 engine with a big fan in it. Could potentially fly an aircraft if you're clever enough. It's turbosuperchargers increase weight and efficiency at high-altitude flight.

		// Part : fightercockpit
		#loc_APP_part_fightercockpit_title = MK1 Non-Commercial Cockpit
		#loc_APP_part_fightercockpit_description = Designed mostly for non-commercial crafts. The box it came from states that its recommended use is for training kerbals. That's why there are two seats on the cockpit. One for the trainer and another for the trainee.

		// Part : fightergear
		#loc_APP_part_fightergear_title = KS-51 Landing Gear
		#loc_APP_part_fightergear_description = There are a lot of landing gear choices you can have in the program but it's quite illogical that there is a lacking of assymetric landing gears which mirror the suspension left and right on its respective sides. Sure, the effect could be the fact that it would be difficult to manufacture the parts exactly like the other side but those are just minor details, no need to get into.

		// Part : fighterinlinecockpit
		#loc_APP_part_fighterinlinecockpit_title = MK1 Inline Non-Commercial Cockpit
		#loc_APP_part_fighterinlinecockpit_description = An inline cockpit designed mostly for non-commercial crafts. The cockpit itself can fit two kerbals in it. The consequence of this is that there are no internal access, only through the glass canopy can they get out of the cockpit.

		// Part : fokkerprop
		#loc_APP_part_fokkerprop_title = 9J "Baron" Rotary Engine
		#loc_APP_part_fokkerprop_description = Wait, the whole engine spins?!

		// Part : fowlerflap
		#loc_APP_part_fowlerflap_title = Trailing Edge Slotted Flap
		#loc_APP_part_fowlerflap_description = Take an Elevon 2B and refurbish it to have a greater angle to increase the wing's camber. The mechanism hinders moving in two angles but it works so it's out for the market. This flap is generally put in the trailing edge or the back part of the wing. Not that it's a mandatory issue, it's just like that on the manual. Usage can range to reaction with pitch to help in take-offs or be used for landing in full deployment. Can sometimes be used for subtle changes in cruise speeds as well.

		// Part : halfmini
		#loc_APP_part_halfmini_title = Mk0 Junior Liquid Fuel Fuselage
		#loc_APP_part_halfmini_description = No money? No problem!

		// Part : hanglel
		#loc_APP_part_hanglel_title = Angled Wing Connector A
		#loc_APP_part_hanglel_description = Not capable of lifting a plane hull of the ground, but sure works with the selection provided by Kerbal Standard and works with everything else too. Angled five degrees!

		// Part : hangles
		#loc_APP_part_hangles_title = Angled Wing Connector B
		#loc_APP_part_hangles_description = Not capable of lifting a plane hull of the ground, but sure works with the selection provided by Kerbal Standard and works with everything else too. Angled five degrees!

		// Part : hawkerprop
		#loc_APP_part_hawkerprop_title = RR "Count" K.XI Engine
		#loc_APP_part_hawkerprop_description = All big things start small. So does the RR series. One of the earliest versions of the RR series of engines before they got into more powerful ones.

		// Part : herculescockpit
		#loc_APP_part_herculescockpit_title = Size 2 Non-Commercial Cockpit
		#loc_APP_part_herculescockpit_description = Carries up to 3 Kerbals, due to a more capable interior. The Non-Commercial Cockpit is a far cousin of the Commercial Cockpit, modified to have a little bit more visibility. It is also slightly more sturdy with more reinforced materials, adding a little bit more to the weight but we are not going to fat shame a cockpit, it's the modern Kerbal Century.

		// Part : herculesfrontgear
		#loc_APP_part_herculesfrontgear_title = KS-130 Low Landing Gear
		#loc_APP_part_herculesfrontgear_description = Heavy duty wheels bolted on to state of the art metal tubes for quality suspension. The wheels are great and it's proven because it worked well from its original rover wheel form. Changes into landing gear have got to be negligible.

		// Part : herculesgear
		#loc_APP_part_herculesgear_title = KS-130-S2 Low Landing Gear
		#loc_APP_part_herculesgear_description = Heavy duty wheels bolted on to state of the art metal tubes for quality suspension. The wheels are great and it's proven because it worked well from its original rover wheel form. Changes into landing gear have got to be negligible.

		// Part : herculesprop
		#loc_APP_part_herculesprop_title = RR K56 "Titan" Turboprop Engine
		#loc_APP_part_herculesprop_description = BIG propellers! Powerful enough to carry almost anything but speed is not its strength.

		// Part : hipcockpit
		#loc_APP_part_hipcockpit_title = Size 2 Viewer's Cockpit
		#loc_APP_part_hipcockpit_description = A slower way of lugging a fuselage around would be using a Viewer's Cockpit and look around the scenery in such cockpit full of glass. There are no other cockpits of this size and smaller that could give you this much space and view at the same time.

		// Part : hipprop
		#loc_APP_part_hipprop_title = KV2-117A "Hippo" Turboshaft Engine
		#loc_APP_part_hipprop_description = More power usually meant bigger in the Kerbal industry. So the Hippo Turboshaft Engine is the powerhouse for about Size 2 fuselages. It features bulky metal pieces which make sure that the 5 powerful blades don't go flying in their own directions.

		// Part : hiptail
		#loc_APP_part_hiptail_title = KV2-117A-S Control Rotor
		#loc_APP_part_hiptail_description = In the competition for Control Rotors, the KV2-117A is unmatched. Though, it features 3 blades, they are quite huge and powerful. It's bigger than your usual set of Control Rotors. Of course, it results to a better control, as well as more weight. But the power-to-weight losses should be minimal.

		// Part : hlfSrf
		#loc_APP_part_hlfSrf_title = Elevon 0
		#loc_APP_part_hlfSrf_description = Made from the finest materials at hand, these flight surfaces are guaranteed to operate while attached to the craft. However studies have shown that a lack of atmosphere *may* slightly impede function. No refunds.

		// Part : hueycockpit
		#loc_APP_part_hueycockpit_title = MK3S1.5 Viewer's Cockpit
		#loc_APP_part_hueycockpit_description = Fortunate Kerbals who get assigned to the MK3S1.5 Viewer's Cockpit which reaches up to two will be able to take advantage of the spacious interior and wide glass cockpit design with skylight. Very utilitarian design and despite the very open design, the structure is quite sturdy and withstood a lot of corrosion during its time buried on the depths of the ocean where it was found.

		// Part : hueyprop
		#loc_APP_part_hueyprop_title = L K53 "Valkyrie" Turboshaft Engine
		#loc_APP_part_hueyprop_description = The Valkyrie Turboshaft Engine is one of the salvaged parts from the oceans of the east. A good number of parts was found dumped to the see and brought back to be refurbished. This engine is unique in that it has a stabilizer on top paired with two huge blades, usually producing a chopping sound.

		// Part : hueytail
		#loc_APP_part_hueytail_title = L K53-S Control Rotor
		#loc_APP_part_hueytail_description = Usually used with the Valkyrie Turboshaft engine, found on separate parts on the bottom of the ocean with all the dumped similar parts a few decades ago. This is used to keep the yaw of the craft stable and helps moving it too.

		// Part : kruegerflap
		#loc_APP_part_kruegerflap_title = Leading Edge Krueger Flap
		#loc_APP_part_kruegerflap_description = Sometimes incredible effort is needed to make a statement. This this flap is made. The show-off mechanism of such complex operation is there basking in all its glory when deployed. This flap is generally put in the leading edge or the front part of the wing. Not that it's a mandatory issue, it's just like that on the manual. Usage can range to reaction with pitch to help in take-offs or be used for landing in full deployment. Can sometimes be used for subtle changes in cruise speeds as well.

		// Part : landingskid
		#loc_APP_part_landingskid_title = Anti-Roll Landing Skids
		#loc_APP_part_landingskid_description = Tired of rolling away while sitting on a cylindrical fuselage? Say no more! We present to you the Anti-Roll Landing Skids! Just attach on the bottom of your fuselage and you can even sit on it.

		// Part : merlin
		#loc_APP_part_merlin_title = RR "Marlin" Engine
		#loc_APP_part_merlin_description = jet engines are too mainstream. Kilroy was here. This is what you use when you want something better than the whirlwind.

		// Part : migfin
		#loc_APP_part_migfin_title = Delta-Advanced Winglet
		#loc_APP_part_migfin_description = The Delta-Advanced Winglet is a much bigger aerodynamic surface than the Delta-Deluxe. If you need a conspicuous winglet or just feel the need to show off that you have aerodynamic control, Delta-Advanced winglet will do the job for you.

		// Part : miggear
		#loc_APP_part_miggear_title = KS-29 Tall Landing Gear
		#loc_APP_part_miggear_description = With earlier landing strips in mind, the KS-29 is designed for rougher landing areas. The consequence is getting developed later than it was predicted so the project has only been made when the landing strip was already smooth. Which is why no resposibilities held if landing gear doesn't perform well on rough terrain. Not to say it would perform like that...

		// Part : miniboom
		#loc_APP_part_miniboom_title = Mk0 Tail Connector
		#loc_APP_part_miniboom_description = Nosecone? More like ice cream cone!

		// Part : minishortboom
		#loc_APP_part_minishortboom_title = Mk0 Tail Connector Short
		#loc_APP_part_minishortboom_description = Nosecone? More like ice cream cone!

		// Part : mk1DroneCore
		#loc_APP_part_mk1DroneCore_title = MK1 Drone Core
		#loc_APP_part_mk1DroneCore_description = Fully Autonomous. Doesn't need kerbals to run.

		// Part : mk1SasModule
		#loc_APP_part_mk1SasModule_title = Mk1 Inline Stabilizer
		#loc_APP_part_mk1SasModule_description = Removing the Drone Core made the torque be easily reconfigured with all the free spaces free after the removal. It's now lighter with just the stabilizer and upgrades in torque made it much more balance and quite stronger.

		// Part : mk1cargodoor
		#loc_APP_part_mk1cargodoor_title = Mk1 Cargo Bay CRG-50-1
		#loc_APP_part_mk1cargodoor_description = Fancy way of carrying things around. We've had this brilliant idea of cutting away parts of Mk1 Structural Fuselage to be able to put something on it while not using the top or bottom.

		// Part : mk1cargodoorjr
		#loc_APP_part_mk1cargodoorjr_title = Mk1 Junior Cargo Bay CRG-50-0
		#loc_APP_part_mk1cargodoorjr_description = Fancy way of carrying things around. We've had this brilliant idea of cutting away parts of Mk1 Structural Fuselage to be able to put something on it while not using the top or bottom.

		// Part : mk1dronedoor
		#loc_APP_part_mk1dronedoor_title = Mk1 Nose Trunk CRG-NT
		#loc_APP_part_mk1dronedoor_description = What else could you put if your craft is drone controlled? Or maybe you want to put something inside that's in front of your craft ins substitute of the cockpit? Kerbal Standard has come up with a solution. Big and Plenty of space. A trunk under the nosecone!

		// Part : mk1intake
		#loc_APP_part_mk1intake_title = Mk1 Intake
		#loc_APP_part_mk1intake_description = An intake for the Mk1 body size. Offers two types of intake, only depends on the consumer's choice upon what design should be used.

		// Part : mk2hAdapter
		#loc_APP_part_mk2hAdapter_title = Mk2/H to 1.25m Adapter
		#loc_APP_part_mk2hAdapter_description = Generic Mk2/H to Mk1 adapter.

		// Part : mk2hLiquid
		#loc_APP_part_mk2hLiquid_title = Mk2h Liquid Fuel Fuselage
		#loc_APP_part_mk2hLiquid_description = In an effort to get more speed, we've decided that the half bottom part of the tank isn't necessary. Hopefully it still flies well. Only carries Liquid Fuel.

		// Part : mk2hboom
		#loc_APP_part_mk2hboom_title = Mk2/H Flat Boom
		#loc_APP_part_mk2hboom_description = Attached on the end of Mk2/H parts. Supposedly.

		// Part : mk2mk2h
		#loc_APP_part_mk2mk2h_title = Mk2/H to Mk2 Adapter
		#loc_APP_part_mk2mk2h_description = Generic Mk2h to Mk1 adapter. Make that half whole again.

		// Part : mk3galaxy
		#loc_APP_part_mk3galaxy_title = Mk3 Cargo Cockpit
		#loc_APP_part_mk3galaxy_description = If you ever needed to put cargo through the front of your aircraft or have such limited space that the only option of putting cargo in is through the front, then this is the cockpit for you.

		// Part : mk3s0
		#loc_APP_part_mk3s0_title = Mk3S0 Liquid Fuel Fuselage
		#loc_APP_part_mk3s0_description = For whatever use might be found in using such a small tank, this exists as an even (although slightly) smaller version of the Size 0 Series of bulkhead, with removed side panels.

		// Part : mk3s0-s0
		#loc_APP_part_mk3s0-s0_title = Mk3S0 to 0.625m Adapter
		#loc_APP_part_mk3s0-s0_description = Adapts the Mk3S0 bulkhead to a circular 0.625m size bulkhead.

		// Part : mk3s0booma
		#loc_APP_part_mk3s0booma_title = Mk3S0 Tail Connector A
		#loc_APP_part_mk3s0booma_description = A uniquely designed aerodynamic part which fits the Mk3S0 bulkhead.

		// Part : mk3s0boomb
		#loc_APP_part_mk3s0boomb_title = Mk3S0 Tail Connector B
		#loc_APP_part_mk3s0boomb_description = A uniquely designed aerodynamic part which fits the Mk3S0 bulkhead.

		// Part : mk3s0jr
		#loc_APP_part_mk3s0jr_title = Mk3S0 Liquid Fuel Fuselage Junior
		#loc_APP_part_mk3s0jr_description = One of the smallest fuel tanks in the parts catalog of Kerbals, for whatever needs it may cover.

		// Part : mk3s0nose
		#loc_APP_part_mk3s0nose_title = Mk3S0 Nosecone
		#loc_APP_part_mk3s0nose_description = A uniquely designed aerodynamic part which fits the Mk3S0 bulkhead.

		// Part : mk3s1
		#loc_APP_part_mk3s1_title = Mk3S1 Liquid Fuel Fuselage
		#loc_APP_part_mk3s1_description = The most popular bulkhead in the catalog which is Mk1 or Mk1S1 or Size 1 (1.25m), whatever you may want to call it, it's too mainstream. So for some change, the Mk3S1 series is a modified version which is less circular.

		// Part : mk3s1-s1
		#loc_APP_part_mk3s1-s1_title = Mk3S1 to 1.25m Adapter
		#loc_APP_part_mk3s1-s1_description = Adapts the Mk3S1 bulkhead to a circular 1.25m size bulkhead.

		// Part : mk3s1booma
		#loc_APP_part_mk3s1booma_title = Mk3S1 Tail Connector A
		#loc_APP_part_mk3s1booma_description = A modified version of the regular Mk1 Tail Connector series, has less rounded features but does not make it any less aerodynamic.

		// Part : mk3s1boomb
		#loc_APP_part_mk3s1boomb_title = Mk3S1 Tail Connector B
		#loc_APP_part_mk3s1boomb_description = A modified version of the regular Mk1 Tail Connector series, has less rounded features but does not make it any less aerodynamic.

		// Part : mk3s1intake
		#loc_APP_part_mk3s1intake_title = Mk3S1 Adjustable Ramp Intake
		#loc_APP_part_mk3s1intake_description = An Adjustable Ramp Intake put on diet. Slightly lighter, but more importantly, can be fit in more places the Mk1 can not.

		// Part : mk3s1jr
		#loc_APP_part_mk3s1jr_title = Mk3S1 Liquid Fuel Fuselage Junior
		#loc_APP_part_mk3s1jr_description = Simply a cut version of its Senior part, right in the middle, producing two Mk3S1 bulkheads which are half in length.

		// Part : mk3s1nose
		#loc_APP_part_mk3s1nose_title = Mk3S1 Nosecone
		#loc_APP_part_mk3s1nose_description = A modified version of the regular Mk1 Tail Connector series, has less rounded features but does not make it any less aerodynamic.

		// Part : mk3s1p5
		#loc_APP_part_mk3s1p5_title = Mk3S1.5 Liquid Fuel Fuselage
		#loc_APP_part_mk3s1p5_description = The bulkead of Mk3S1.5 is relatively new but its creation not so much. Of course the Liquid Fuel fuselages are new but the bulkhead isn't, some of the parts are found lying on the ocean floor on the east of Kerbin.

		// Part : mk3s1p5-mk3s1
		#loc_APP_part_mk3s1p5-mk3s1_title = Mk3S1.5-Mk3S1 Liquid Fuel Fuselage
		#loc_APP_part_mk3s1p5-mk3s1_description = From one Mk3 bulkhead to another. For structural purposes. And fuel too.

		// Part : mk3s1p5-s1p5
		#loc_APP_part_mk3s1p5-s1p5_title = Mk3S1.5 to 1.875m Adapter
		#loc_APP_part_mk3s1p5-s1p5_description = Adapts the Mk3S1.5 bulkhead to a circular 1.875m size bulkhead.

		// Part : mk3s1p5doorbase
		#loc_APP_part_mk3s1p5doorbase_title = Mk3S1.5 Cargo Bay
		#loc_APP_part_mk3s1p5doorbase_description = It close and it opens, comes with glass or without it, depending on the build it is on or whatever is needed. Usually does not allow Kerbals to EVA when it's the only thing between two solid bulkheads but Kerbals can get in through it anytime.

		// Part : mk3s1p5hull
		#loc_APP_part_mk3s1p5hull_title = Mk3S1.5 Structural Fuselage
		#loc_APP_part_mk3s1p5hull_description = Regular Mk3S1.5 Fuselages were occasionally expected to have corroded interiors and thus, stripped of its interior, making it a sturdy structural fuselage instead.

		// Part : mk3s1p5jr
		#loc_APP_part_mk3s1p5jr_title = Mk3S1.5 Liquid Fuel Fuselage Junior
		#loc_APP_part_mk3s1p5jr_description = Recycled from parts lying around on the ocean floor of the eastern seas of Kerbin, the most badly damaged parts are cut and thus could only form smaller lengths of the Mk3S1.5 Bulkhead.

		// Part : navlight
		#loc_APP_part_navlight_title = Navigation Illuminator
		#loc_APP_part_navlight_description = The Navigation Illuminator is a small light used to tell people that there's something there in the dark.

		// Part : noseconemk1
		#loc_APP_part_noseconemk1_title = Nosecone Mk1
		#loc_APP_part_noseconemk1_description = An unorthodox nosecone, the size of Mk1.

		// Part : oh6cockpit
		#loc_APP_part_oh6cockpit_title = MK1 Viewer's Cockpit II
		#loc_APP_part_oh6cockpit_description = A later model of the Viewer's cockpit of the Mk1. The design was changed to accomodate a built in light in front of it. It's much sleeker and round in appearance so that the air understands that it shouldn't mess with it.

		// Part : oldfightercockpit
		#loc_APP_part_oldfightercockpit_title = MK1 Caged Inline Cockpit
		#loc_APP_part_oldfightercockpit_description = A relatively newer version of the MK1/0 cockpit. Initially named MK1/1 but it was decided to be redundant and reduced to MK1 instead.

		// Part : passengeroor
		#loc_APP_part_passengeroor_title = Mk1 Passenger Door
		#loc_APP_part_passengeroor_description = Designed to make a way for kerbals trying to get out of the Mk1 hollow fuselages.

		// Part : powerprop
		#loc_APP_part_powerprop_title = K73 "Beluga" Turboshaft Engine
		#loc_APP_part_powerprop_description = Long blades are another thing. Six blades are another. But six long blades should mean business.

		// Part : powertail
		#loc_APP_part_powertail_title = K73-S Control Rotor
		#loc_APP_part_powertail_description = It's a control rotor. And it's attached to the tail. But it seems like a wasted potential. I mean - look at it, it's huge enough to power a small fuselage. It even has more propellers than a Maverick Turboshaft Engine Rotor.

		// Part : predatorprop
		#loc_APP_part_predatorprop_title = K76 "Predator" Turboprop Engine
		#loc_APP_part_predatorprop_description = A powerful turboprop engine. It really proves that blade count is just a number.

		// Part : raptorjet
		#loc_APP_part_raptorjet_title = J-119 "Cheetah" Afterburning Turbofan
		#loc_APP_part_raptorjet_description = An innovative new way of vectoring engines. Unlike universal vectoring, the J-119 only vectors on a single axis. The concept makes the engine vector just like how a wing moves. The consequence of this is that it can't correct outside of its vectoring range.

		// Part : roundwinglet
		#loc_APP_part_roundwinglet_title = Round-Deluxe Winglet
		#loc_APP_part_roundwinglet_description = The Round-Deluxe Winglet is a much more well-rounded aerodynamic surface with no pun intended and a bigger built-in aileron than the Delta-Deluxe Winglet.

		// Part : s1p5
		#loc_APP_part_s1p5_title = 1.875m Liquid Fuel Fuselage
		#loc_APP_part_s1p5_description = The Size 1.5 bulkhead - measure 1.875m diameter - is an existent rocket fuselage, such fuselages usually fall down from the sky, these have thick exteriors. Usually, it's possible to polish the outside and revamp the interior to only contain Liquid Fuel.

		// Part : s1p5CrewCabin
		#loc_APP_part_s1p5CrewCabin_title = Size 1.5 Crew Cabin
		#loc_APP_part_s1p5CrewCabin_description = For those that couldn't nearly afford 2.5m passenger cabins, a size 1.5 crew cabin is offered with half the capacity. Due to taxes imposed on importing whole crafts, the parts are cut to be assembled on site.

		// Part : s1p5booma
		#loc_APP_part_s1p5booma_title = Size 1.5 Tail Connector A
		#loc_APP_part_s1p5booma_description = Aerodynamic tail for 1.875m sized parts.

		// Part : s1p5boomashort
		#loc_APP_part_s1p5boomashort_title = Size 1.5 Tail Connector A Short
		#loc_APP_part_s1p5boomashort_description = Aerodynamic tail for 1.875m sized parts.

		// Part : s1p5boomb
		#loc_APP_part_s1p5boomb_title = Size 1.5 Tail Connector B
		#loc_APP_part_s1p5boomb_description = Aerodynamic tail for 1.875m sized parts.

		// Part : s1p5boombshort
		#loc_APP_part_s1p5boombshort_title = Size 1.5 Tail Connector B Short
		#loc_APP_part_s1p5boombshort_description = Aerodynamic tail for 1.875m sized parts.

		// Part : s1p5door
		#loc_APP_part_s1p5door_title = Size 1.5 Air Ramp
		#loc_APP_part_s1p5door_description = Part of the Size 1.5 set for assembly, used to get up or down from the hull itself.

		// Part : s1p5hull
		#loc_APP_part_s1p5hull_title = Size 1.5 Structural Fuselage Junior
		#loc_APP_part_s1p5hull_description = Made of cheap but durable materials, not to mention lightweight as well.

		// Part : s1p5hulllong
		#loc_APP_part_s1p5hulllong_title = Size 1.5 Structural Fuselage
		#loc_APP_part_s1p5hulllong_description = Made of cheap but durable materials, not to mention lightweight as well.

		// Part : s1p5jr
		#loc_APP_part_s1p5jr_title = 1.875m Liquid Fuel Fuselage Junior
		#loc_APP_part_s1p5jr_description = The length of the 1.875m Liquid Fuel Fuselage Junior is basically the half of its regular counterpart. Smaller lengths are usually easier to manufacture due to the amount of parts that could be used to recycle it. Most badly damaged parts of a tank could be cut down and still make a Junior fuselage.

		// Part : s2CargoRamp
		#loc_APP_part_s2CargoRamp_title = Size 2 Cargo Ramp
		#loc_APP_part_s2CargoRamp_description = A sophisticated deployment system for cargo delivery on the ground, or on the sea, or in mid-air, or in a vacuum. Wherever you want, really.

		// Part : s2cargobayS
		#loc_APP_part_s2cargobayS_title = Size 2 Cargo Bay CRG-15
		#loc_APP_part_s2cargobayS_description = The removal of the inside tanks inside hulls made it possible to make empty Size 2 Hulls. Cutting past halfway up from both sides, putting hinges on each side and halving the topside made an opening for top possible. Can be used anywhere you need it.

		// Part : shortboom
		#loc_APP_part_shortboom_title = Short Tail Connector B
		#loc_APP_part_shortboom_description = Nosecone? More like ice cream cone!

		// Part : shortboomb
		#loc_APP_part_shortboomb_title = Short Tail Connector A
		#loc_APP_part_shortboomb_description = Nosecone? More like ice cream cone!

		// Part : sidegear
		#loc_APP_part_sidegear_title = KS-16 Slant Landing Gear
		#loc_APP_part_sidegear_description = Sometimes there's a need to have landing gears which are diagonal from the aircraft but it's just not right when the wheels are diagonal as well. The KS-16 Landing Gear is an idea concieved for the very reason of having diagonal landing gears with wheels planted to the ground. There might be negligible problems with having the small suspension struts outstretched the way it is but it shouldn't be a problem.

		// Part : size2CrewCabin
		#loc_APP_part_size2CrewCabin_title = Size 2 Crew Cabin
		#loc_APP_part_size2CrewCabin_description = If you thought that Hitchhikers were just not cutting it for carrying Kerbals, then you need a better 2.5m Cabin. Designed to take up to 16 Kerbals as long as you can afford the very cheap price for comfort and haulage.

		// Part : size2Fuselage
		#loc_APP_part_size2Fuselage_title = Size 2 Liquid Fuel Fuselage
		#loc_APP_part_size2Fuselage_description = Sure you can take a 2.5m tank and remove the oxidizer. But the tank of oxidizer remains. Why not use a tank containing only Liquid Fuel?

		// Part : size2taila
		#loc_APP_part_size2taila_title = Tail Connector Size 2A
		#loc_APP_part_size2taila_description = A simple aerodynamic tail for aircraft. Designed to fit onto all standard 1.25m attachments, this part is the embodiment of our "Let's Fly", line of parts.

		// Part : size2tailashort
		#loc_APP_part_size2tailashort_title = Short Tail Connector Size 2A
		#loc_APP_part_size2tailashort_description = Shortened version of the Tail Connector Size 2A. If there is no need for the longer alternative or just out of budget.

		// Part : size2tailb
		#loc_APP_part_size2tailb_title = Tail Connector Size 2B
		#loc_APP_part_size2tailb_description = A simple aerodynamic tail for aircraft. Designed to fit onto all standard 1.25m attachments, this part is the embodiment of our "Let's Fly", line of parts.

		// Part : size2tailbshort
		#loc_APP_part_size2tailbshort_title = Short Tail Connector Size 2B
		#loc_APP_part_size2tailbshort_description = Shortened version of the Tail Connector Size 2B. If there is no need for the longer alternative or just out of budget.

		// Part : size2under
		#loc_APP_part_size2under_title = Size 2 Radial Liquid Fuel Mount
		#loc_APP_part_size2under_description = Attached on Size 2 tanks. Usually a mount for other objects. Can be stacked to form a line.

		// Part : smallwingConnector1
		#loc_APP_part_smallwingConnector1_title = Wing Connector Type F
		#loc_APP_part_smallwingConnector1_description = Repurposed laboratory whiteboards.

		// Part : smallwingConnector2
		#loc_APP_part_smallwingConnector2_title = Wing Connector Type G
		#loc_APP_part_smallwingConnector2_description = Repurposed laboratory whiteboards.

		// Part : smallwingConnector3
		#loc_APP_part_smallwingConnector3_title = Wing Connector Type H
		#loc_APP_part_smallwingConnector3_description = Repurposed laboratory whiteboards.

		// Part : smallwingConnector4
		#loc_APP_part_smallwingConnector4_title = Wing Connector Type I
		#loc_APP_part_smallwingConnector4_description = Repurposed laboratory whiteboards.

		// Part : smallwingConnector5
		#loc_APP_part_smallwingConnector5_title = Wing Connector Type J
		#loc_APP_part_smallwingConnector5_description = Repurposed laboratory whiteboards.

		// Part : smallwingConnector6
		#loc_APP_part_smallwingConnector6_title = Wing Connector Type K
		#loc_APP_part_smallwingConnector6_description = Repurposed laboratory whiteboards.

		// Part : smallwingConnectortip
		#loc_APP_part_smallwingConnectortip_title = Wing Connector Tip
		#loc_APP_part_smallwingConnectortip_description =

		// Part : spadprop
		#loc_APP_part_spadprop_title = 8A "Spud" Engine
		#loc_APP_part_spadprop_description = Your friendly "powerful" early flight Vee engine.

		// Part : spitfiremerlin
		#loc_APP_part_spitfiremerlin_title = RR "Kraken" Engine
		#loc_APP_part_spitfiremerlin_description = Very powerful, even more powerful than Marlin that it was named after a mythological creature - the Kraken.

		// Part : spoilerflap
		#loc_APP_part_spoilerflap_title = S.P.O.I.L.E.R
		#loc_APP_part_spoilerflap_description = The Supplementary Part Operation In Lift Express Reduction (S.P.O.I.L.E.R) works just like how it is in the tin. Say you want some additional devices as you have more lift than you want to have. Aside from other methods, this method of lift dumping is one of the simpler ones. Unlike A.I.R.B.R.A.K.E.S, the plan is to not just add drag. Go fly it and see if it's actually true.

		// Part : straightslat
		#loc_APP_part_straightslat_title = Leading Edge Slat Straight
		#loc_APP_part_straightslat_description = Functioning like a fashionable slat drooping down. This flap is generally put in the leading edge or the front part of the wing. Not that it's a mandatory issue, it's just like that on the manual. Usage can range to reaction with pitch to help in take-offs or be used for landing in full deployment. Can sometimes be used for subtle changes in cruise speeds as well.

		// Part : stubbytinynose
		#loc_APP_part_stubbytinynose_title = Small Nose Cone Stubby
		#loc_APP_part_stubbytinynose_description = A stubby nose cap.

		// Part : tbmProp
		#loc_APP_part_tbmProp_title = KT6A "Kitty" Turboprop Engine
		#loc_APP_part_tbmProp_description = The KT6A engine remains kerbal's most popular engine in its class. Mainly because it is the only engine like it in its class.

		// Part : tinynoseb
		#loc_APP_part_tinynoseb_title = Small Nose Cone B
		#loc_APP_part_tinynoseb_description = A slanted nose cap.

		// Part : vanglel
		#loc_APP_part_vanglel_title = Angled Wing Connector C
		#loc_APP_part_vanglel_description = Not capable of lifting a plane hull of the ground, but sure works with the selection provided by Kerbal Standard and works with everything else too. Angled five degrees!

		// Part : vangles
		#loc_APP_part_vangles_title = Angled Wing Connector D
		#loc_APP_part_vangles_description = Not capable of lifting a plane hull of the ground, but sure works with the selection provided by Kerbal Standard and works with everything else too. Angled five degrees!

		// Part : warhawkfin
		#loc_APP_part_warhawkfin_title = Basic Curve Winglet
		#loc_APP_part_warhawkfin_description = The basic curve winglet is a utilitarian's choice for a winglet. It possesses sturdy features and one of the biggest control surface for a winglet. Its ambiguity if it's a winglet or a canard is part of its charm.

		// Part : x1cockpit
		#loc_APP_part_x1cockpit_title = MK1 Supersonic Cockpit
		#loc_APP_part_x1cockpit_description = Specifically made for the sole purpose of being able to break the sound barrier but it doesn't mean it should. The weight has been reduced as much as possible with stripping out all the materials off the cockpit. There is much glass just in case there is need to check out what is happening to the rest of the atmosphere if ever a fortunate kerbal is indeed at literal breakneck speed.

		// Part : x1gear
		#loc_APP_part_x1gear_title = KS-X1 Steerable Landing Gear
		#loc_APP_part_x1gear_description = Your only choice for a compact, reliable, good looking, steerable landing gear. Can be used any way and anywhere you like. Fair warning, do not forget that you have put this landing gear somewhere.

		// Part : x1sidegear
		#loc_APP_part_x1sidegear_title = KS-X1 Assymetric Landing Gear
		#loc_APP_part_x1sidegear_description = The KS-X1 Assymetric Landing Gears offers a great way of stowing landing gear smoothly into the fuselage. If there was ever a need to hide landing gears from the sight of the kerbals, this is the way to do it.

		// Part : yakprop
		#loc_APP_part_yakprop_title = KM-105P "Silver Crow" Engine
		#loc_APP_part_yakprop_description = 404 Description Not Found

		// Part : zerocockpit
		#loc_APP_part_zerocockpit_title = MK1/0 Caged Inline Cockpit
		#loc_APP_part_zerocockpit_description = If you ever feel unsafe while flying with only glass between you and the things that might be in the atmosphere, then you should use one of these. It's still sleek but safer looking. Doesn't mean it's safer but at least it looks safe.

		// Part : zeroprop
		#loc_APP_part_zeroprop_title = K-14 "Divine Wind" Radial Engine
		#loc_APP_part_zeroprop_description = This great engine has two rows of radial engines! Talk about more power! *Waranty void if more power is achieved*

	}
}

